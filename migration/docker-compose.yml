# Ephemeral MySQL 8 used only to load a WordPress dump and run the extract query.
# Spun up and torn down by `npm run extract`. Nothing here persists across runs.
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wp}
    command: --max_allowed_packet=512M --local-infile=1
    ports:
      - "${MYSQL_HOST_PORT:-33061}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 3s
      timeout: 5s
      retries: 30
    # tmpfs keeps the (large) import in RAM and guarantees nothing is written to disk.
    tmpfs:
      - /var/lib/mysql
